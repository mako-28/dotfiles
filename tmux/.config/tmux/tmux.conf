# vi: set ft=conf :

# prefixキーを C-t に変更する
set -g prefix C-t
unbind C-b

# キーストロークのディレイを減らす
set -sg escape-time 1

# ウィンドウ/ペインのインデックスを1から始める
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# 設定ファイルをリロードする
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded ~/.config/tmux/tmux.conf"

# C-t を tmux 内のプログラムへ送る
bind C-t send-prefix

# 記号でペイン分割
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 新規windowはpathを引き継ぐ
bind c new-window -c "#{pane_current_path}"
# 名前を入力して新しいsessionを作成する
bind S command-prompt -p "session name" "new-session -c '#{pane_current_path}' -s '%%'"

# Vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# bind -r C-h select-window -t :-
# bind -r C-l select-window -t :+

# Vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# マウス操作を有効にする
# (mode-mouse / mouse-select-* は廃止され、mouse へ統合された)
set -g mouse on

# 端末設定
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"
set -g xterm-keys on

# スタイル設定
# (status-fg/bg, *-attr, pane-*-fg/bg などの旧オプションを style 系へ移行)
set -g pane-active-border-style fg=white

# 非アクティブなペインの背景を少し暗くする
set -g window-style "fg=colour247,bg=colour236"

# アクティブなペインの背景
set -g window-active-style "fg=terminal,bg=terminal"

# ステータスバー
set -g status-style fg=colour254,bg=colour238
set -g window-status-current-style fg=colour254,bg=colour238
set -g window-status-format "#[fg=colour252,bg=colour238] #I:#W "
set -g window-status-current-format "#[fg=colour16,bg=colour250] #I:#W "
set -g window-status-separator ""
set -g automatic-rename on
if-shell '[ -n "$SSH_CONNECTION" ]' \
  'set -g @host_style "#[fg=colour231,bg=colour160,bold]"' \
  'set -g @host_style "#[fg=colour16,bg=colour250,bold]"'
set -g status-left-length 100
set -g status-left "#[fg=colour16,bg=#{?pane_in_mode,colour226,colour250}] #{?pane_in_mode,CP,NO} #[fg=colour16,bg=#{?client_prefix,colour118,colour250}] P #[fg=colour16,bg=colour250,nobold] #S "
set -g status-right "#[fg=colour252]%Y-%m-%d %H:%M #{@host_style} #h #[nobold,fg=colour252,bg=colour238]"
set -g status-interval 60
set -g status-justify centre
set -g status-position bottom

# 通知
set -g monitor-activity on
set -g visual-activity on

# コピーモード
set -g mode-keys vi

# 全般
set -g set-titles on
set -g history-limit 100000

# session/window作成時に自動でペインを分割する
set-hook -g after-new-session "split-window -h -p 40; split-window -v -p 40; select-pane -t 1"
set-hook -g after-new-window  "split-window -h -p 40 -c '#{pane_current_path}'; split-window -v -p 40 -c '#{pane_current_path}'; select-pane -t 1"

# ~/.config/local/tmux/tmux.conf があれば最後に読み込む
if-shell "[ -f ~/.config/local/tmux/tmux.conf ]" "source-file ~/.config/local/tmux/tmux.conf"
